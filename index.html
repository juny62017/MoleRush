<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>MoleRush</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="game-container">

        <h1>
            MoleRush
        </h1>

        <p class="subtitle">
            Whack The Mole Game
        </p>

        <div class="top-bar">

            <div class="card">
                <p>Score</p>
                <h2 class="score">
                    0
                </h2>
            </div>

            <div class="card">
                <p>Time</p>
                <h2 class="timer">
                    30
                </h2>
            </div>

        </div>

        <button class="start-btn">
            Start Game
        </button>

        <div class="grid">

            <div class="hole">
                <div class="mole"></div>
            </div>

            <div class="hole">
                <div class="mole"></div>
            </div>

            <div class="hole">
                <div class="mole"></div>
            </div>

            <div class="hole">
                <div class="mole"></div>
            </div>

            <div class="hole">
                <div class="mole"></div>
            </div>

            <div class="hole">
                <div class="mole"></div>
            </div>

            <div class="hole">
                <div class="mole"></div>
            </div>

            <div class="hole">
                <div class="mole"></div>
            </div>

            <div class="hole">
                <div class="mole"></div>
            </div>

        </div>

        <div class="game-over hidden">

            <h2>
                Time Up!
            </h2>

            <p class="final-score">
                Final Score: 0
            </p>

            <button class="restart-btn">
                Play Again
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
